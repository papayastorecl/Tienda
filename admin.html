<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Papaya Store Admin V5</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f5f5f5;
padding:30px;
}

.container{
max-width:800px;
margin:auto;
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 0 15px rgba(0,0,0,.1);
}

h1{
margin-bottom:20px;
}

label{
display:block;
margin-top:15px;
font-weight:bold;
}

input{
width:100%;
padding:10px;
margin-top:5px;
font-size:16px;
}

button{
margin-top:20px;
padding:12px 25px;
border:none;
background:#ff7f6b;
color:white;
font-size:16px;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#ff6b57;
}

</style>

</head>

<body>

<div class="container">

<h1>Papaya Store Admin V5</h1>

<h2>Configuración</h2>

<label>Sunscreen %</label>
<input id="sunscreen_pct">

<label>Serum %</label>
<input id="serum_pct">

<label>Toner %</label>
<input id="toner_pct">

<label>Cream %</label>
<input id="cream_pct">

<label>Premium %</label>
<input id="premium_pct">

<label>USD → CLP</label>
<input id="usd_clp">

<label>USD → ARS</label>
<input id="usd_ars">

<button onclick="guardar()">
Guardar Configuración
</button>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="js/supabase-config.js"></script>

<script>

async function cargar(){

const {data,error} =
await supabaseClient
.from('configuracion')
.select('*')
.eq('id',1)
.single();

if(error){
console.error(error);
return;
}

document.getElementById('sunscreen_pct').value=data.sunscreen_pct;
document.getElementById('serum_pct').value=data.serum_pct;
document.getElementById('toner_pct').value=data.toner_pct;
document.getElementById('cream_pct').value=data.cream_pct;
document.getElementById('premium_pct').value=data.premium_pct;
document.getElementById('usd_clp').value=data.usd_clp;
document.getElementById('usd_ars').value=data.usd_ars;

}

async function guardar(){

const {error} =
await supabaseClient
.from('configuracion')
.update({

sunscreen_pct:Number(document.getElementById('sunscreen_pct').value),

serum_pct:Number(document.getElementById('serum_pct').value),

toner_pct:Number(document.getElementById('toner_pct').value),

cream_pct:Number(document.getElementById('cream_pct').value),

premium_pct:Number(document.getElementById('premium_pct').value),

usd_clp:Number(document.getElementById('usd_clp').value),

usd_ars:Number(document.getElementById('usd_ars').value)

})
.eq('id',1);

if(error){
console.error(error);
alert('Error al guardar');
return;
}

alert('Configuración guardada');

}

cargar();

  <h2>Promoción</h2>

<label>Título</label>
<input id="promo_titulo">

<label>Código</label>
<input id="promo_codigo">

<label>Descuento %</label>
<input id="promo_porcentaje">

<label>Activa</label>
<select id="promo_activa">
  <option value="true">Sí</option>
  <option value="false">No</option>
</select>

<button onclick="guardarPromocion()">
Guardar Promoción
</button>

</script>

</body>
</html>
