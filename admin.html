<!DOCTYPE html>

<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Papaya Store Admin V5</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f5f5f5;
padding:30px;
}

.container{
max-width:800px;
margin:auto;
background:#fff;
padding:25px;
border-radius:12px;
box-shadow:0 0 15px rgba(0,0,0,.1);
}

input,select{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:15px;
}

button{
padding:12px 20px;
background:#ff7f6b;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}
</style>

</head>

<body>

<div class="container">

<h1>Papaya Store Admin V5</h1>

<label>Sunscreen %</label> <input id="sunscreen_pct">

<label>Serum %</label> <input id="serum_pct">

<label>Toner %</label> <input id="toner_pct">

<label>Cream %</label> <input id="cream_pct">

<label>Premium %</label> <input id="premium_pct">

<label>USD → CLP</label> <input id="usd_clp">

<label>USD → ARS</label> <input id="usd_ars">

<button onclick="guardar()">
Guardar Configuración
</button>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="js/supabase-config.js"></script>

<script>

async function cargar(){

const {data,error} =
await supabaseClient
.from('configuracion')
.select('*')
.eq('id',1)
.single();

if(error){
console.error(error);
return;
}

document.getElementById('sunscreen_pct').value=data.sunscreen_pct;
document.getElementById('serum_pct').value=data.serum_pct;
document.getElementById('toner_pct').value=data.toner_pct;
document.getElementById('cream_pct').value=data.cream_pct;
document.getElementById('premium_pct').value=data.premium_pct;
document.getElementById('usd_clp').value=data.usd_clp;
document.getElementById('usd_ars').value=data.usd_ars;

}

async function guardar(){

const {error} =
await supabaseClient
.from('configuracion')
.update({

sunscreen_pct:Number(document.getElementById('sunscreen_pct').value),
serum_pct:Number(document.getElementById('serum_pct').value),
toner_pct:Number(document.getElementById('toner_pct').value),
cream_pct:Number(document.getElementById('cream_pct').value),
premium_pct:Number(document.getElementById('premium_pct').value),
usd_clp:Number(document.getElementById('usd_clp').value),
usd_ars:Number(document.getElementById('usd_ars').value)

})
.eq('id',1);

if(error){
alert('Error');
return;
}

alert('Configuración guardada');

}

cargar();

</script>

</body>
</html>
