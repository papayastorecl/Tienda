<script>

async function cargar(){

const {data,error} =
await supabaseClient
.from('configuracion')
.select('*')
.eq('id',1)
.single();

if(error){
console.error(error);
return;
}

document.getElementById('sunscreen_pct').value=data.sunscreen_pct;
document.getElementById('serum_pct').value=data.serum_pct;
document.getElementById('toner_pct').value=data.toner_pct;
document.getElementById('cream_pct').value=data.cream_pct;
document.getElementById('premium_pct').value=data.premium_pct;
document.getElementById('usd_clp').value=data.usd_clp;
document.getElementById('usd_ars').value=data.usd_ars;

}

async function guardar(){

const {error} =
await supabaseClient
.from('configuracion')
.update({

sunscreen_pct:Number(document.getElementById('sunscreen_pct').value),

serum_pct:Number(document.getElementById('serum_pct').value),

toner_pct:Number(document.getElementById('toner_pct').value),

cream_pct:Number(document.getElementById('cream_pct').value),

premium_pct:Number(document.getElementById('premium_pct').value),

usd_clp:Number(document.getElementById('usd_clp').value),

usd_ars:Number(document.getElementById('usd_ars').value)

})
.eq('id',1);

if(error){
console.error(error);
alert('Error al guardar');
return;
}

alert('Configuración guardada');

}

async function cargarPromocion(){

const {data,error} =
await supabaseClient
.from('promociones')
.select('*')
.eq('id',1)
.single();

if(error){
console.error(error);
return;
}

document.getElementById('promo_titulo').value =
data.titulo || '';

document.getElementById('promo_codigo').value =
data.codigo || '';

document.getElementById('promo_porcentaje').value =
data.porcentaje || 0;

document.getElementById('promo_activa').value =
data.activa ? 'true' : 'false';

}

async function guardarPromocion(){

const {error} =
await supabaseClient
.from('promociones')
.update({

titulo:
document.getElementById('promo_titulo').value,

codigo:
document.getElementById('promo_codigo').value,

porcentaje:
Number(document.getElementById('promo_porcentaje').value),

activa:
document.getElementById('promo_activa').value === 'true'

})
.eq('id',1);

if(error){
console.error(error);
alert('Error al guardar promoción');
return;
}

alert('Promoción guardada');

}

cargar();
cargarPromocion();

</script>
