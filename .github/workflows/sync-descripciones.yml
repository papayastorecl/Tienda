name: Completar descripciones desde Jolse

# Botón manual: Actions → "Completar descripciones desde Jolse" → "Run workflow"
# Solo toca productos que tienen el campo "beneficios" vacío.
on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r scripts/requirements.txt

      - name: Ejecutar sincronización
        run: python scripts/sync_descripciones_jolse.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
